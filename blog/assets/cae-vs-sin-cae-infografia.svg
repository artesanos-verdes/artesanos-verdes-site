<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <rect width="1200" height="520" fill="#f7f7f5"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="70" fill="#1a4d30"/>
  <text x="60" y="30" fill="#a8c4b0" font-size="11" font-weight="700" letter-spacing="2.5">COSTE REAL · VIVIENDA 100 m²</text>
  <text x="60" y="55" fill="#ffffff" font-size="22" font-weight="700">El factor que cambia todo: el sistema CAE</text>

  <!-- LEFT: Sin CAE -->
  <g transform="translate(80, 130)">
    <text x="0" y="0" fill="#888" font-size="14" font-weight="700" letter-spacing="1.5">SIN CAE</text>
    <text x="0" y="20" fill="#666" font-size="13">Paga el cliente directamente</text>

    <!-- Bar 1: Lana mineral -->
    <g transform="translate(0, 50)">
      <text x="0" y="0" fill="#1a1a1a" font-size="13" font-weight="700">Lana mineral</text>
      <rect x="0" y="10" width="250" height="30" rx="4" fill="#2d7a4e"/>
      <text x="260" y="30" fill="#1a1a1a" font-size="14" font-weight="800">3 150 €</text>
    </g>

    <!-- Bar 2: Celulosa -->
    <g transform="translate(0, 110)">
      <text x="0" y="0" fill="#1a1a1a" font-size="13" font-weight="700">Celulosa</text>
      <rect x="0" y="10" width="235" height="30" rx="4" fill="#c07856"/>
      <text x="245" y="30" fill="#1a1a1a" font-size="14" font-weight="800">2 950 €</text>
    </g>

    <!-- Bar 3: Lana de roca -->
    <g transform="translate(0, 170)">
      <text x="0" y="0" fill="#1a1a1a" font-size="13" font-weight="700">Lana de roca</text>
      <rect x="0" y="10" width="350" height="30" rx="4" fill="#666"/>
      <text x="360" y="30" fill="#1a1a1a" font-size="14" font-weight="800">4 400 €</text>
    </g>

    <text x="0" y="240" fill="#666" font-size="12" font-style="italic">Precios medios · 30 cm espesor</text>
  </g>

  <!-- Middle arrow -->
  <g transform="translate(550, 230)">
    <circle cx="50" cy="40" r="50" fill="#1a4d30"/>
    <text x="50" y="35" fill="#ffffff" font-size="32" font-weight="800" text-anchor="middle">CAE</text>
    <text x="50" y="55" fill="#a8c4b0" font-size="10" font-weight="700" text-anchor="middle">MITECO</text>
    <!-- Arrow -->
    <path d="M 105 40 L 160 40 L 155 30 L 180 40 L 155 50 L 160 40" fill="#1a4d30" stroke="#1a4d30" stroke-width="2"/>
  </g>

  <!-- RIGHT: Con CAE -->
  <g transform="translate(770, 130)">
    <rect x="-20" y="-20" width="380" height="280" rx="12" fill="#e8f5ee" stroke="#2d7a4e" stroke-width="2"/>

    <text x="0" y="0" fill="#2d7a4e" font-size="14" font-weight="700" letter-spacing="1.5">CON CAE · LANA MINERAL</text>
    <text x="0" y="20" fill="#1a4d30" font-size="13">Financiado por energéticas</text>

    <!-- Big figure -->
    <text x="0" y="110" fill="#1a4d30" font-size="96" font-weight="900">1 €</text>
    <text x="0" y="140" fill="#2d7a4e" font-size="16" font-weight="700">coste simbólico para ti</text>

    <!-- Savings -->
    <text x="0" y="185" fill="#888" font-size="12" font-weight="600">AHORRO INMEDIATO</text>
    <text x="0" y="210" fill="#c07856" font-size="24" font-weight="800">3 149 €</text>

    <text x="0" y="240" fill="#888" font-size="11" font-style="italic">+ 600-1 200 €/año en calefacción</text>
  </g>

  <!-- Footer -->
  <text x="600" y="505" fill="#666" font-size="11" font-weight="600" text-anchor="middle">Sistema CAE regulado por RD 36/2023 · Sujeto delegado: GreenFlex · Los Artesanos Verdes</text>
</svg>
